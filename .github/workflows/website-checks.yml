name: Website checks

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/figures/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "tests/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/website-checks.yml"
  workflow_dispatch:

jobs:
  website-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Generate wildfire phylogeny figure
        run: python scripts/figures/generate_wildfire_modeling_phylogeny.py

      - name: Generate FIRE-MODEL Gantt assets
        run: python scripts/generate_fire_model_gantt.py

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run website review
        run: bash scripts/review_site.sh --junitxml site-test-results.xml

      - name: Upload website test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-check-artifacts
          path: |
            dist
            site-test-results.xml
