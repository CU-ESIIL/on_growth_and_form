site_name: "On Growth and Form"
site_description: "NSF proposal workspace for fire, growth, and form"
site_url: "https://cu-esiil.github.io/on_growth_and_form/"

repo_name: "CU-ESIIL/on_growth_and_form"
repo_url: "https://github.com/CU-ESIIL/on_growth_and_form"
edit_uri: "edit/main/docs/"

nav:
  - Home: index.md
  - Funder Materials:
      - Overview: funder-materials.md
      - FIRE-MODEL Briefing: fire-model-briefing.md
      - Requirements Checklist: requirements-checklist.md
  - Background and Context:
      - Overview: background-context.md
      - Program Context: program-context.md
      - Intellectual Foundations:
          - On Growth and Form Overview: on-growth-and-form-overview.md
      - Scaling and Geometry:
          - Diffusion and 1/2 Scaling: diffusion-half-scaling.md
          - Non-1/2 Scaling Signatures: non-half-scaling-signatures.md
          - Wildfire Scaling and Dimensionality: wildfire-scaling-dimensionality.md
          - Superdiffusive Wildfire Perimeters: superdiffusive-wildfire-perimeters.md
          - Fire Modeling and Scaling: fire-modeling-scaling.md
          - Wildfire Scaling Regime Hypothesis: wildfire-scaling-regime-hypothesis.md
          - Wildfire Scaling Research Agenda: wildfire-scaling-research-agenda.md
      - Systems and Infrastructure:
          - Environmental Data Science Stack: environmental-data-science-stack.md
          - FIRED and CubeDynamics: fired-cubedynamics.md
      - Research Programs:
          - Wildfire Scaling Work Plan: wildfire-scaling-work-plan.md
  - Proposal Workflow: workflow.md
  - Repository Map: repository-map.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
