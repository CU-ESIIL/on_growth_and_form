site_name: "On Growth and Form"
site_description: "NSF proposal workspace for fire, growth, and form"
site_url: "https://cu-esiil.github.io/on_growth_and_form/"

repo_name: "CU-ESIIL/on_growth_and_form"
repo_url: "https://github.com/CU-ESIIL/on_growth_and_form"
edit_uri: "edit/main/docs/"

nav:
  - Home: index.md
  - Proposal Workflow: workflow.md
  - Repository Map: repository-map.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
