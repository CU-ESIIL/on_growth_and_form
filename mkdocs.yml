theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/tokens.css
  - stylesheets/extra.css

plugins:
  - search
